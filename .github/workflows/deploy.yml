# Deploys 4ravu.com to app-server using a blue-green slot switch.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST          - app-server's address (5.161.206.200)
#   SSH_USER          - deploy
#   SSH_PRIVATE_KEY   - private half of a dedicated keypair registered in
#                        deploy's ~/.ssh/authorized_keys on app-server
#                        (do not reuse the wood-stone gh-actions-deploy key)
#   SSH_KNOWN_HOSTS   - output of: ssh-keyscan -H 5.161.206.200
#
# All deploy logic lives in server/4ravu-deploy.sh on the server; this
# workflow only rsyncs content over and triggers it.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to app-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync site content to the incoming staging directory
        run: |
          rsync -av --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "server" \
            --exclude "Caddyfile" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/4ravu-site/incoming/"

      - name: Sync internal Caddyfile
        run: |
          rsync -av \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./Caddyfile "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/4ravu-site/Caddyfile"

      - name: Run blue-green deploy on the server
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "bash /opt/4ravu-site/4ravu-deploy.sh"
